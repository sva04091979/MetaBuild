name: Create Release

on:
  push:
    branches:
      - main   # или по триггеру, который вам нужен

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get next release number
        id: next
        run: |
          latest=$(git tag -l 'release-*' | sed 's/release-//' | sort -n | tail -1)
          if [ -z "$latest" ]; then
            next=1
          else
            next=$((latest + 1))
          fi
          echo "tag=release-$next" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.next.outputs.tag }}
          generate_release_notes: true
          # если нужно загрузить файлы, добавьте files: