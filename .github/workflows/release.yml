name: Create Release on master push

on:
  push:
    branches:
      - master
      
permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install git-lfs
        run: |
          sudo apt-get update
          sudo apt-get install git-lfs
          git lfs install

      - name: Pull LFS files
        run: git lfs pull

      - name: Archive Mt4
        run: zip -r mt4.zip Mt4/

      - name: Archive Mt5
        run: zip -r mt5.zip Mt5/

      - name: Get next release number
        id: next_release
        run: |
          latest=$(git tag -l 'release-*' | sed 's/release-//' | sort -n | tail -1)
          if [ -z "$latest" ]; then
            next=1
          else
            next=$((latest + 1))
          fi
          echo "tag=release-$next" >> $GITHUB_OUTPUT
          echo "name=Release $next" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.next_release.outputs.tag }}
          name: ${{ steps.next_release.outputs.name }}
          draft: false
          prerelease: false
          files: |
            mt4.zip
            mt5.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}